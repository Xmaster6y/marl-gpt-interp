defaults:
  - _self_

output_dir: results/experiments/2026-07-06-environment-mechanism-probes
dataset_config_path: marl-gpt/config/dataset_config.json
dataset_config_split: train
checkpoint: results/marl-gpt-main.pt

envs:
  - smac
  - pogema
  - grf
device: cuda
seed: 0
batch_size: 60
num_batches: 8
max_block_size: 161
max_action_size: 20
last_token: true
env_specific: true
run_model: true

max_inspect_files_per_folder: 1
max_feature_columns: 4096
train_fraction: 0.7
probe_steps: 250
probe_lr: 0.03
probe_weight_decay: 0.01
