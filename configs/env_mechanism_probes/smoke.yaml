defaults:
  - _self_

output_dir: results/experiments/smoke-environment-mechanism-probes
dataset_config:
  smac:
    config:
      history_len: 6
      history_step: 1
    map_types: []
    folder_paths: []
  pogema:
    config: {}
    folder_paths: []
  grf:
    config:
      history_len: 6
      history_step: 1
    folder_paths: []

envs:
  - smac
  - pogema
  - grf
device: cpu
seed: 0
batch_size: 6
num_batches: 1
max_block_size: 161
max_action_size: 20
last_token: true
env_specific: true
run_model: false

max_inspect_files_per_folder: 1
max_feature_columns: 256
train_fraction: 0.7
probe_steps: 10
probe_lr: 0.03
probe_weight_decay: 0.01

hydra:
  run:
    dir: results/hydra/env_mechanism_probes/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: results/hydra/env_mechanism_probes_sweep/${now:%Y-%m-%d_%H-%M-%S}
