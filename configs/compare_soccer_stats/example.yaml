defaults:
  - _self_

output_dir: results/examples/soccer/analysis

event_paths:
  - results/examples/soccer/normalized/human/events.jsonl
  - results/examples/soccer/normalized/grf/events.jsonl
  - results/examples/soccer/normalized/robocup2d/events.jsonl

tracking_paths:
  - results/examples/soccer/normalized/human/tracking.jsonl
  - results/examples/soccer/normalized/grf/tracking.jsonl
  - results/examples/soccer/normalized/robocup2d/tracking.jsonl

pitch_control:
  grid_x: 6
  grid_y: 4

hydra:
  run:
    dir: results/hydra/compare_soccer_stats/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: results/hydra/compare_soccer_stats_sweep/${now:%Y-%m-%d_%H-%M-%S}
