defaults:
  - _self_

output_dir: results/experiments/2026-07-21-sparse-support-recovery-convergence
domains: [smac, grf, pogema]
seeds: [0, 1, 2, 3, 4]
synthetic:
  input_dim: 32
  features_per_support: 2
  samples_per_domain: 256
  active_features: 3
regimes:
  - {name: balanced, assumption_holding: true, noise_std: 0.02, correlation: 0.0, anisotropy: 0.0, superposition: 0.0, hierarchy: 0.0, imbalance: [1.0, 1.0, 1.0]}
model:
  k: 3
training:
  steps: 5000
  batch_size: 128
  learning_rate: 0.001
gate:
  support_macro_f1: 0.80
  reconstruction_tolerance: 0.05
  stable_seed_count: 4
  decoder_match_threshold: 0.70
hydra:
  run:
    dir: results/hydra/sparse_synthetic/support_recovery/${now:%Y-%m-%d_%H-%M-%S}
