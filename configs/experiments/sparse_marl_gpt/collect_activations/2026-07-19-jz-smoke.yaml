defaults:
  - _self_

output_dir: results/experiments/2026-07-19-sparse-activation-cache-smoke
checkpoint: results/marl-gpt-main.pt
dataset_config:
  smac:
    config: {history_len: 6, history_step: 1, part_of_dataset: 1}
    map_types: [zerg]
    folder_paths: [dataset/zerg_5_vs_5]
  pogema:
    config: {part_of_dataset: 1}
    folder_paths: [dataset/dataset_pogema_ll/random]
  grf:
    config: {history_len: 6, history_step: 1, part_of_dataset: 1, load_part_file: false}
    folder_paths: [dataset/dataset_grf/trajectories/academy_corner]
envs: [smac, pogema, grf]
activation_locations: [layer_03:final, layer_06:final]
grouping_mode: batch_schema_smoke
trajectory_group_field: trajectory_id
device: cuda:0
seed: 0
batch_size: 30
num_batches: 2
max_block_size: 700
max_action_size: 20
last_token: true
env_specific: true
hydra:
  run:
    dir: results/hydra/sparse_marl_gpt/collect_activations/${now:%Y-%m-%d_%H-%M-%S}
