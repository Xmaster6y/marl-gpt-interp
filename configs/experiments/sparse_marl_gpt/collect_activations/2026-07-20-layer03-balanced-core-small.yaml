defaults:
  - _self_

output_dir: results/experiments/2026-07-20-layer03-balanced-core-small-cache
checkpoint: results/marl-gpt-main.pt
dataset_config:
  smac:
    config: {history_len: 6, history_step: 1, part_of_dataset: 1}
    map_types: [zerg]
    folder_paths: [/lustre/fsn1/projects/rech/nwq/uim47nr/marl-gpt-interp/balanced-datasets/2026-07-20-core-small/dataset/zerg_5_vs_5]
  pogema:
    config: {part_of_dataset: 1}
    folder_paths: [/lustre/fsn1/projects/rech/nwq/uim47nr/marl-gpt-interp/balanced-datasets/2026-07-20-core-small/dataset/dataset_pogema_ll/random]
  grf:
    config: {history_len: 6, history_step: 1, part_of_dataset: 1, load_part_file: false}
    folder_paths: [/lustre/fsn1/projects/rech/nwq/uim47nr/marl-gpt-interp/balanced-datasets/2026-07-20-core-small/dataset/dataset_grf/trajectories/academy_corner]
envs: [smac, pogema, grf]
activation_locations: [layer_03:final]
grouping_mode: source_file
group_field: source_file_id
minimum_groups_per_environment: 6
max_rows_per_source: 8192
device: cuda:0
seed: 0
batch_size: 192
num_batches: 768
max_block_size: 700
max_action_size: 20
last_token: true
env_specific: true
hydra:
  run:
    dir: results/hydra/sparse_marl_gpt/collect_activations/${now:%Y-%m-%d_%H-%M-%S}
