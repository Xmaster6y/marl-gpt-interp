defaults:
  - _self_

# Edit input_path and column_map for each provider export.
# Supported input formats: CSV, JSONL, or JSON list/object with a top-level "rows" list.
sources:
  - dataset: human
    kind: events
    input_path: results/raw/human/events.csv
    output_path: results/normalized/human/events.jsonl
    column_map:
      match_id: match_id
      possession_id: possession_id
      team_id: team_id
      player_id: player_id
      timestamp: second
      event_type: event_type
      outcome: outcome
      x: x
      y: y
      end_x: end_x
      end_y: end_y

  - dataset: grf
    kind: tracking
    input_path: results/raw/grf/tracking.csv
    output_path: results/normalized/grf/tracking.jsonl
    column_map:
      match_id: episode
      frame_id: step
      timestamp: step
      team_id: team_id
      player_id: player_id
      x: x
      y: y
      vx: vx
      vy: vy
      is_ball: is_ball

  - dataset: robocup2d
    kind: events
    input_path: results/raw/robocup2d/events.csv
    output_path: results/normalized/robocup2d/events.jsonl
    column_map:
      match_id: game_id
      possession_id: possession
      team_id: team
      player_id: unum
      timestamp: cycle
      event_type: type
      outcome: result
      x: x
      y: y
      end_x: target_x
      end_y: target_y
