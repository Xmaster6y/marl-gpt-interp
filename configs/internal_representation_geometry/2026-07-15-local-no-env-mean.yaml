defaults:
  - _self_

output_dir: results/experiments/2026-07-15-internal-representation-geometry-no-env-mean
checkpoint: results/marl-gpt-main.pt

dataset_config:
  smac:
    config:
      history_len: 6
      history_step: 1
      part_of_dataset: 1
    map_types:
      - zerg
    folder_paths:
      - dataset/zerg_5_vs_5
  pogema:
    config:
      part_of_dataset: 1
    folder_paths:
      - dataset/dataset_pogema_ll/random
  grf:
    config:
      history_len: 6
      history_step: 1
      part_of_dataset: 1
      load_part_file: false
    folder_paths:
      - dataset/dataset_grf/trajectories/academy_corner

envs:
  - smac
  - pogema
  - grf
device: cpu
seed: 3
batch_size: 60
num_batches: 8
max_block_size: 700
max_action_size: 20
last_token: true
env_specific: true
exclude_final_token_from_mean: true

max_inspect_files_per_folder: 1
max_pairwise_examples_per_env: 256
max_pca_rank: 128
asymmetric_top_ks:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128

hydra:
  run:
    dir: results/hydra/internal_representation_geometry/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: results/hydra/internal_representation_geometry_sweep/${now:%Y-%m-%d_%H-%M-%S}
