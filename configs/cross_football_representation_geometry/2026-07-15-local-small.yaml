defaults:
  - _self_

output_dir: results/experiments/2026-07-15-cross-football-representation-geometry
checkpoint: results/marl-gpt-main.pt
device: cpu
seed: 4
batch_size: 4
max_examples_per_source: 264
max_frames_per_source: 12

encoding:
  source_x_half: 52.5
  source_y_half: 34.0
  target_y_half: 0.4444444444444444
  direction_mode: finite_difference
  velocity_dt: 0.1
  history_len: 6
  history_step: 1
  block_size: 700
  action_size: 20
  environment_id: 3
  environment_attr: 128

laliga:
  path: results/raw/human/fuji-schema-smoke/mini/data-00000-of-00001.arrow
  max_sequences: 1
  max_frames: 30

robocup:
  path: results/raw/robocup2d/stp-raw-smoke/0802-2032-helios2024-cyrus2024-0040-sim30.tracking.csv
  max_frames: 30

native_grf:
  map_name: 11vs11a11
  warmup_steps: 5
  max_steps: 30

max_pairwise_examples_per_env: 132
max_pca_rank: 64
top_direction_features: 12
asymmetric_top_ks:
  - 1
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128

hydra:
  run:
    dir: results/hydra/cross_football_representation_geometry/${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: results/hydra/cross_football_representation_geometry_sweep/${now:%Y-%m-%d_%H-%M-%S}
